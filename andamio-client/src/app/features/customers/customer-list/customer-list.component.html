<div class="client-feature-container">
  <header class="tools-header">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input 
        type="text" 
        placeholder="FILTRAR POR NOMBRE O DIRECCIÓN..." 
        (input)="onSearch($event)"
        class="search-input">
    </div>
    <button class="btn-andamio" routerLink="/customer/new">+ NUEVO CLIENTE</button>
  </header>

  <div class="client-grid">
    @for (customer of filteredCustomers; track customer.id) {
      <div class="client-card">
        <div class="card-status-bar"></div>
        
        <div class="card-body">
          <div class="info-group">
            <h3 class="client-name">{{ customer.first_name }} {{ customer.last_name }}</h3>
            <p class="data-number phone">{{ customer.phone }}</p>
            <p class="address">{{ customer.address || 'SIN DIRECCIÓN REGISTRADA' }}</p>
          </div>

          <div class="card-actions">
            <button class="btn-action" routerLink="/evaluations/new" title="Agendar Evaluación">📅 Agendar Evaluación</button>
            <button class="btn-action" title="Crear Cotización">📄 Cotizar</button>
          </div>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <p>⚠️ NO SE ENCONTRÓ INFRAESTRUCTURA DE CLIENTES CON ESE FILTRO.</p>
      </div>
    }
  </div>
</div>
