<div class="form-container">
  <h3>👤 Registro de Nuevo Clientx</h3>
  
  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label>Nombre(s):</label>
      <input type="text" formControlName="first_name" class="form-control" placeholder="Ej: Charly" required>
    </div>

    <div class="form-group">
      <label>Apellido(s):</label>
      <input type="text" formControlName="last_name" class="form-control" placeholder="Ej: Pulenta" required>
    </div>

    <div class="form-group">
      <label>Teléfono de Contacto:</label>
      <input type="text" formControlName="phone" class="form-control" placeholder="55 1234 5678" required>
    </div>

    <div class="form-group">
      <label>Dirección Principal (Obra/Casa):</label>
      <textarea 
        formControlName="address" 
        class="form-control" 
        placeholder="Calle, número, colonia y CP..." 
        rows="3"
        required></textarea>
    </div>
    
    <button type="submit" 
            [disabled]="customerForm.invalid">
      Guardar y Dar de Alta
    </button>
  </form>
</div>
