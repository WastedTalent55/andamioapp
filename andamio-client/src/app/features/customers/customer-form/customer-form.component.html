<div class="form-container" style="margin-bottom: 20px; padding: 20px; border: 1px solid #ccc;">
  <h3>Registrar Nuevo Cliente</h3>
  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
    <input type="text" formControlName="first_name" placeholder="Nombre" required>
    <input type="text" formControlName="last_name" placeholder="Apellido" required>
    <input type="email" formControlName="email" placeholder="Correo Electrónico" required>
    <input type="text" formControlName="phone" placeholder="Teléfono" required>
    
    <button type="submit" [disabled]="customerForm.invalid">Guardar Cliente</button>
  </form>
</div>
