<div class="canvas-container">
  <header>
    <div>
      <h2>📝 Notas de Evaluación</h2>
      <button routerLink="/board">Volver</button>
    </div>
    <p *ngIf="evaluation">
      <strong>Cliente:</strong> {{ evaluation.first_name }} {{ evaluation.last_name }} | 
      <strong>Proyecto:</strong> {{ evaluation.requested_work || 'Sin título definido' }}
    </p>
  </header>

  <form [formGroup]="notesForm" (ngSubmit)="saveNotes()">
    <div class="paper-effect">
      <textarea 
        formControlName="notes"
        placeholder="Escribe aquí medidas, observaciones técnicas, materiales vistos o requerimientos del cliente..."
      ></textarea>
    </div>

    <div>
      <button class="btn-andamio" type="submit">
        💾 Guardar Notas de Visita
      </button>
    </div>
  </form>
</div>
