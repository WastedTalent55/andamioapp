<div class="canvas-container" style="padding: 20px; max-width: 900px; margin: 0 auto;">
  <header style="margin-bottom: 20px; border-bottom: 2px solid #e67e22; padding-bottom: 10px;">
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
      <h2 style="margin: 0; color: #2c3e50;">📝 Notas de Evaluación</h2>
      <button routerLink="/evaluations" style="background: none; border: 1px solid #ccc; cursor: pointer;">Volver</button>
    </div>
    <p *ngIf="evaluation" style="margin: 5px 0; color: #666;">
      <strong>Cliente:</strong> {{ evaluation.first_name }} {{ evaluation.last_name }} | 
      <strong>Proyecto:</strong> {{ evaluation.requested_work }} [6]
    </p>
  </header>

  <form [formGroup]="notesForm" (ngSubmit)="saveNotes()">
    <div class="paper-effect" style="background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; padding: 20px; min-height: 500px;">
      <textarea 
        formControlName="notes"
        placeholder="Escribe aquí medidas, observaciones técnicas, materiales vistos o requerimientos del cliente..."
        style="width: 100%; min-height: 450px; border: none; outline: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 1.1rem; line-height: 1.6; resize: none; background: transparent;"
      ></textarea>
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
      <button type="submit" style="background: #e67e22; color: white; padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
        💾 Guardar Notas de Visita
      </button>
    </div>
  </form>
</div>
