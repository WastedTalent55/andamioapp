<div class="form-container">
  <h3>Agendar Nueva Evaluación Técnica</h3>
  
  <form [formGroup]="evaluationForm" (ngSubmit)="onSubmit()">
    <div>
      <label>Seleccionar Cliente:</label><br>
      <select formControlName="customer_id" (change)="onCustomerChange($event)">
        <option value="" disabled>-- Elige un cliente --</option>
        <option *ngFor="let c of customers" [value]="c.id">
          {{ c.first_name }} {{ c.last_name }}
        </option>
      </select>
    </div>

    <div>
  <label>Dirección de la Visita:</label><br>
  <select formControlName="address_id">
    <option value="" disabled>-- Selecciona la ubicación --</option>
    <option *ngFor="let addr of filteredAddresses" [value]="addr.id">
      {{ addr.full_address || 'Dirección Principal' }}
    </option>
  </select>
  <small *ngIf="filteredAddresses.length === 0">
    ⚠️ Selecciona un cliente primero.
  </small>
</div>

    <div>
      <label>Fecha de Visita:</label><br>
      <input type="datetime-local" formControlName="scheduled_date">
    </div>

    <div>
      <label>Costo de Evaluación (Configurable):</label><br>
      <input type="number" formControlName="evaluation_cost">
    </div>

    <div>
      <label for="requested_work"><strong>¿Qué trabajo solicita el cliente? (Título)</strong></label>
      <input 
        type="text" 
        id="requested_work" 
        formControlName="requested_work"
        placeholder="Ej: Tratamiento de humedad en techo de baño"
      >
    </div>

    <button type="submit" [disabled]="evaluationForm.invalid">Agendar Visita</button>
  </form>
</div>
