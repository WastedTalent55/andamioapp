<div class="container" style="padding: 20px;">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>📋 Visitas de Evaluación Agendadas</h2>
    <button class="btn-primary" router-link="/evaluations/new">+ Agendar Nueva Visita</button>
  </div>

  <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6;">
      <tr>
        <th style="padding: 12px; text-align: left;">Clientx</th>
        <th style="padding: 12px; text-align: left;">Contacto/Dirección</th>
        <th style="padding: 12px; text-align: left;">Trabajo Solicitado</th>
        <th style="padding: 12px; text-align: center;">Costo Visita</th>
        <th style="padding: 12px; text-align: center;">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let ev of evaluations" style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px;"><strong>{{ ev.first_name }} {{ ev.last_name }}</strong></td>
        <td style="padding: 12px;">
          <small>📞 {{ ev.phone }}</small><br>
          <small>📍 {{ ev.address }}</small>
        </td>
        <td style="padding: 12px;">{{ ev.requested_work }}</td>
        <td style="padding: 12px; text-align: center;">{{ ev.evaluation_cost | currency }}</td>
        <td style="padding: 12px; text-align: center;">
          <!-- BOTÓN CLAVE: Aquí es donde entrarás a "Bajar tus notas de casa" -->
          <button style="background: #e67e22; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
            📝 Añadir Detalles de Visita
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
